<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Admin Panel</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme') || 'dark-2026';
        document.documentElement.setAttribute('data-theme', t);
      } catch (_) {
        document.documentElement.setAttribute('data-theme', 'dark-2026');
      }
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3.4.21/dist/vue.global.prod.js"></script>
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
    .mono { font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace; font-feature-settings: 'ss01', 'cv11'; }

    /* ---------- Dark 2026 theme ---------- */
    html[data-theme="dark-2026"] {
      color-scheme: dark;
      --bg-1: #070811;
      --bg-2: #0c0f1e;
      --surface: rgba(22, 26, 42, 0.66);
      --surface-solid: #141827;
      --surface-2: rgba(34, 40, 62, 0.75);
      --surface-hover: rgba(50, 58, 90, 0.55);
      --border: rgba(148, 158, 210, 0.08);
      --border-strong: rgba(148, 158, 210, 0.18);
      --text: #edf0fa;
      --text-muted: #9aa3be;
      --text-faint: #6b7292;
      --accent: #8b5cf6;
      --accent-2: #22d3ee;
      --accent-hover: #a47dff;
      --accent-soft: rgba(139, 92, 246, 0.14);
      --accent-ring: rgba(139, 92, 246, 0.32);
      --blue: #60a5fa;
      --blue-soft: rgba(96, 165, 250, 0.14);
      --emerald: #34d399;
      --emerald-soft: rgba(52, 211, 153, 0.14);
      --amber: #fbbf24;
      --amber-soft: rgba(251, 191, 36, 0.14);
      --red: #f87171;
      --red-soft: rgba(248, 113, 113, 0.14);
      --indigo: #818cf8;
      --sky: #38bdf8;
      --glow-accent: 0 8px 32px -10px rgba(139, 92, 246, 0.55), 0 0 0 1px rgba(139, 92, 246, 0.28);
      --glow-emerald: 0 8px 32px -10px rgba(52, 211, 153, 0.55), 0 0 0 1px rgba(52, 211, 153, 0.28);
      --glow-red: 0 8px 32px -10px rgba(248, 113, 113, 0.55), 0 0 0 1px rgba(248, 113, 113, 0.30);
      --glow-indigo: 0 8px 32px -10px rgba(129, 140, 248, 0.55), 0 0 0 1px rgba(129, 140, 248, 0.28);
      --shadow-glass: 0 20px 60px -24px rgba(0, 0, 0, 0.65), 0 1px 0 0 rgba(255, 255, 255, 0.04) inset;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Animated ambient background */
    html[data-theme="dark-2026"] body {
      background:
        radial-gradient(1200px 600px at 85% -10%, rgba(139, 92, 246, 0.22), transparent 60%),
        radial-gradient(900px 500px at -10% 10%, rgba(34, 211, 238, 0.14), transparent 65%),
        radial-gradient(800px 500px at 50% 110%, rgba(52, 211, 153, 0.08), transparent 60%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      background-attachment: fixed;
      color: var(--text);
    }
    html[data-theme="dark-2026"] body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.25), transparent 50%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.18), transparent 50%),
        radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.22), transparent 50%),
        radial-gradient(1px 1px at 85% 40%, rgba(255,255,255,0.18), transparent 50%),
        radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.20), transparent 50%);
      opacity: 0.35;
      mix-blend-mode: screen;
      animation: drift 28s linear infinite;
    }
    @keyframes drift {
      0%   { transform: translate3d(0, 0, 0); }
      50%  { transform: translate3d(-10px, -12px, 0); }
      100% { transform: translate3d(0, 0, 0); }
    }

    /* Surface overrides */
    html[data-theme="dark-2026"] .bg-white {
      background: var(--surface);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-glass);
      color: var(--text);
    }
    html[data-theme="dark-2026"] .bg-slate-50 { background: rgba(255, 255, 255, 0.028); }
    html[data-theme="dark-2026"] .bg-slate-100 { background: rgba(255, 255, 255, 0.05); color: var(--text); }
    html[data-theme="dark-2026"] .bg-slate-200 { background: rgba(255, 255, 255, 0.07); }
    html[data-theme="dark-2026"] aside.bg-slate-900 {
      background:
        linear-gradient(180deg, rgba(12, 15, 30, 0.92), rgba(18, 22, 44, 0.88)),
        radial-gradient(400px 300px at 50% 0%, rgba(139, 92, 246, 0.18), transparent 60%);
      border-left: 1px solid var(--border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }
    html[data-theme="dark-2026"] .bg-slate-800 {
      background: linear-gradient(135deg, var(--accent-soft), rgba(34, 211, 238, 0.08));
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(139, 92, 246, 0.28);
    }
    html[data-theme="dark-2026"] .hover\:bg-slate-800:hover { background: rgba(255, 255, 255, 0.04); }
    html[data-theme="dark-2026"] .hover\:bg-slate-50:hover { background: rgba(139, 92, 246, 0.06); }
    html[data-theme="dark-2026"] .hover\:bg-emerald-700:hover { filter: brightness(1.12); }
    html[data-theme="dark-2026"] .hover\:bg-red-700:hover { filter: brightness(1.12); }

    /* Text overrides */
    html[data-theme="dark-2026"] .text-white { color: var(--text); }
    html[data-theme="dark-2026"] .text-slate-900 { color: var(--text); }
    html[data-theme="dark-2026"] .text-slate-600 { color: var(--text-muted); }
    html[data-theme="dark-2026"] .text-slate-500 { color: var(--text-muted); }
    html[data-theme="dark-2026"] .text-slate-400 { color: var(--text-faint); }
    html[data-theme="dark-2026"] .text-slate-300 { color: var(--text-muted); }

    /* Borders */
    html[data-theme="dark-2026"] .border,
    html[data-theme="dark-2026"] .border-b,
    html[data-theme="dark-2026"] .border-t { border-color: var(--border-strong); }
    html[data-theme="dark-2026"] .border-slate-700 { border-color: var(--border); }

    /* Primary CTA (blue) → gradient accent with glow */
    html[data-theme="dark-2026"] .bg-blue-600 {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 140%);
      color: #fff;
      box-shadow: var(--glow-accent);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: transform 0.2s var(--ease), filter 0.2s var(--ease), box-shadow 0.25s var(--ease);
    }
    html[data-theme="dark-2026"] .bg-blue-600:hover:not(:disabled) {
      filter: brightness(1.12);
      transform: translateY(-1px);
      box-shadow: 0 14px 40px -12px rgba(139, 92, 246, 0.7), 0 0 0 1px rgba(139, 92, 246, 0.4);
    }
    html[data-theme="dark-2026"] .bg-emerald-600 {
      background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      color: #04120c;
      box-shadow: var(--glow-emerald);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    html[data-theme="dark-2026"] .bg-red-600 {
      background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
      box-shadow: var(--glow-red);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    html[data-theme="dark-2026"] .bg-indigo-600 {
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      box-shadow: var(--glow-indigo);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    html[data-theme="dark-2026"] .bg-blue-500 {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 12px rgba(139, 92, 246, 0.5);
    }

    /* Status pills */
    html[data-theme="dark-2026"] .bg-blue-100 { background: var(--blue-soft); color: var(--blue); }
    html[data-theme="dark-2026"] .text-blue-800 { color: var(--blue); }
    html[data-theme="dark-2026"] .text-blue-600 { color: var(--accent-hover); }
    html[data-theme="dark-2026"] .bg-emerald-100 { background: var(--emerald-soft); color: var(--emerald); }
    html[data-theme="dark-2026"] .text-emerald-800 { color: var(--emerald); }
    html[data-theme="dark-2026"] .text-emerald-700 { color: var(--emerald); }
    html[data-theme="dark-2026"] .bg-amber-100 { background: var(--amber-soft); color: var(--amber); }
    html[data-theme="dark-2026"] .text-amber-300,
    html[data-theme="dark-2026"] .text-amber-600,
    html[data-theme="dark-2026"] .text-amber-700,
    html[data-theme="dark-2026"] .text-amber-800 { color: var(--amber); }
    html[data-theme="dark-2026"] .bg-red-100 { background: var(--red-soft); color: var(--red); }
    html[data-theme="dark-2026"] .text-red-800,
    html[data-theme="dark-2026"] .text-red-700,
    html[data-theme="dark-2026"] .text-red-600,
    html[data-theme="dark-2026"] .text-red-400,
    html[data-theme="dark-2026"] .text-red-300 { color: var(--red); }
    html[data-theme="dark-2026"] .bg-sky-100 { background: rgba(56, 189, 248, 0.14); color: var(--sky); }
    html[data-theme="dark-2026"] .text-sky-800 { color: var(--sky); }

    /* Warning banner */
    html[data-theme="dark-2026"] .bg-amber-100.border-amber-500 {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.12), rgba(251, 191, 36, 0.03));
      border-color: rgba(251, 191, 36, 0.5);
      color: var(--amber);
    }
    html[data-theme="dark-2026"] .border-amber-500 { border-color: rgba(251, 191, 36, 0.5); }
    html[data-theme="dark-2026"] .border-blue-600 { border-color: var(--accent); }

    /* Math box gradient */
    html[data-theme="dark-2026"] .bg-gradient-to-br.from-slate-900.to-slate-800 {
      background:
        radial-gradient(500px 300px at 20% 0%, rgba(139, 92, 246, 0.25), transparent 60%),
        radial-gradient(400px 250px at 100% 100%, rgba(34, 211, 238, 0.18), transparent 60%),
        linear-gradient(135deg, #0b0e1d 0%, #141a32 100%);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-glass);
    }
    html[data-theme="dark-2026"] .bg-slate-950\/50 {
      background: rgba(5, 7, 15, 0.5);
      border: 1px solid var(--border);
    }

    /* Forms */
    html[data-theme="dark-2026"] input:not([type="checkbox"]):not([type="radio"]),
    html[data-theme="dark-2026"] select,
    html[data-theme="dark-2026"] textarea {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      border: 1px solid var(--border-strong);
      transition: border-color 0.2s var(--ease), box-shadow 0.2s var(--ease), background 0.2s var(--ease);
    }
    html[data-theme="dark-2026"] input::placeholder,
    html[data-theme="dark-2026"] textarea::placeholder { color: var(--text-faint); }
    html[data-theme="dark-2026"] input:not([type="checkbox"]):not([type="radio"]):focus,
    html[data-theme="dark-2026"] select:focus,
    html[data-theme="dark-2026"] textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
      background: rgba(255, 255, 255, 0.05);
    }
    html[data-theme="dark-2026"] select option { background: var(--surface-solid); color: var(--text); }
    html[data-theme="dark-2026"] input[type="checkbox"] { accent-color: var(--accent); }

    /* Code */
    html[data-theme="dark-2026"] code {
      background: rgba(139, 92, 246, 0.12);
      color: var(--accent-hover);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    }

    /* Modal backdrop */
    html[data-theme="dark-2026"] .bg-black\/50 {
      background: rgba(5, 7, 15, 0.72);
      backdrop-filter: blur(10px) saturate(1.1);
      -webkit-backdrop-filter: blur(10px) saturate(1.1);
    }

    /* Shadows → richer on dark */
    html[data-theme="dark-2026"] .shadow,
    html[data-theme="dark-2026"] .shadow-lg,
    html[data-theme="dark-2026"] .shadow-xl { box-shadow: var(--shadow-glass); }

    /* Sidebar nav shine on hover */
    html[data-theme="dark-2026"] aside nav a {
      position: relative;
      overflow: hidden;
      transition: background 0.25s var(--ease), color 0.25s var(--ease), transform 0.2s var(--ease);
    }
    html[data-theme="dark-2026"] aside nav a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, transparent 20%, rgba(139, 92, 246, 0.10) 50%, transparent 80%);
      transform: translateX(-100%);
      transition: transform 0.6s var(--ease);
      pointer-events: none;
    }
    html[data-theme="dark-2026"] aside nav a:hover::before { transform: translateX(100%); }

    /* Tables: subtle hover glow */
    html[data-theme="dark-2026"] table tbody tr { transition: background 0.2s var(--ease); }

    /* Scrollbar */
    html[data-theme="dark-2026"] ::-webkit-scrollbar { width: 10px; height: 10px; }
    html[data-theme="dark-2026"] ::-webkit-scrollbar-track { background: transparent; }
    html[data-theme="dark-2026"] ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(139, 92, 246, 0.35), rgba(34, 211, 238, 0.25));
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    html[data-theme="dark-2026"] ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(139, 92, 246, 0.55), rgba(34, 211, 238, 0.4));
      background-clip: padding-box;
    }
    html[data-theme="dark-2026"] * { scrollbar-color: rgba(139, 92, 246, 0.4) transparent; scrollbar-width: thin; }

    /* Disabled buttons */
    html[data-theme="dark-2026"] button:disabled { filter: grayscale(0.3) brightness(0.85); }

    /* Theme toggle pill */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border-strong, rgba(0,0,0,0.12));
      background: var(--surface, rgba(255,255,255,0.5));
      color: inherit;
      transition: transform 0.2s var(--ease, ease), box-shadow 0.2s var(--ease, ease), background 0.2s var(--ease, ease);
      width: 100%;
      justify-content: center;
    }
    .theme-toggle:hover { transform: translateY(-1px); }
    html[data-theme="dark-2026"] .theme-toggle {
      background: rgba(255, 255, 255, 0.04);
      border-color: var(--border-strong);
      color: var(--text-muted);
    }
    html[data-theme="dark-2026"] .theme-toggle:hover {
      background: var(--accent-soft);
      color: var(--text);
      box-shadow: 0 0 0 1px var(--accent-ring);
    }
    .theme-toggle .dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: linear-gradient(135deg, #8b5cf6, #22d3ee);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.65);
    }

    /* Brand mark glow */
    html[data-theme="dark-2026"] aside > div:first-child {
      text-shadow: 0 0 20px rgba(139, 92, 246, 0.35);
      letter-spacing: 0.3px;
    }

    /* Fade-in for pages */
    html[data-theme="dark-2026"] main > * { animation: fadeUp 0.35s var(--ease) both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Focus ring for links */
    html[data-theme="dark-2026"] a:focus-visible,
    html[data-theme="dark-2026"] button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 6px;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
<div id="app"></div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted, reactive } = Vue;

const api = async (path, opts = {}) => {
  const res = await fetch(path, {
    ...opts,
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw Object.assign(new Error(data.error || res.statusText), { status: res.status, data });
  return data;
};

const fmt = (raw, decimals, precision = 6) => {
  if (!raw || raw === '0') return '0';
  const s = String(raw).padStart(decimals + 1, '0');
  const intPart = s.slice(0, -decimals) || '0';
  const fracPart = s.slice(-decimals).slice(0, precision).replace(/0+$/, '');
  return fracPart ? intPart + '.' + fracPart : intPart;
};

createApp({
  setup() {
    const admin = ref(null);
    const route = ref(location.hash.slice(1) || '/');
    const loading = ref(true);
    const theme = ref(document.documentElement.getAttribute('data-theme') || 'dark-2026');

    const applyTheme = (t) => {
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem('theme', t); } catch (_) {}
    };
    const toggleTheme = () => {
      theme.value = theme.value === 'dark-2026' ? 'light' : 'dark-2026';
      applyTheme(theme.value);
    };

    window.addEventListener('hashchange', () => { route.value = location.hash.slice(1) || '/'; });
    const navigate = (path) => { location.hash = path; };

    const checkAuth = async () => {
      try {
        const { admin: a } = await api('/auth/me');
        admin.value = a;
        if (a.mustChangePassword) navigate('/change-password');
        else if (route.value === '/login' || route.value === '/') navigate('/dashboard');
      } catch { admin.value = null; if (route.value !== '/login') navigate('/login'); }
      finally { loading.value = false; }
    };
    onMounted(checkAuth);

    const logout = async () => {
      await api('/auth/logout', { method: 'POST' }).catch(() => {});
      admin.value = null;
      navigate('/login');
    };

    return { admin, route, loading, navigate, logout, checkAuth, theme, toggleTheme };
  },
  template: `
    <div v-if="loading" class="flex items-center justify-center min-h-screen text-slate-500">بارگذاری...</div>
    <div v-else-if="!admin" class="min-h-screen flex items-center justify-center p-4">
      <login-page @logged-in="checkAuth"></login-page>
    </div>
    <div v-else class="flex min-h-screen">
      <aside class="w-64 bg-slate-900 text-white p-6 flex flex-col">
        <div class="text-xl font-bold mb-8">💼 Wallet Admin</div>
        <nav class="flex-1 space-y-1" v-if="!admin.mustChangePassword">
          <a href="#/dashboard" class="block px-3 py-2 rounded hover:bg-slate-800" :class="route === '/dashboard' ? 'bg-slate-800' : ''">📊 داشبورد</a>
          <a href="#/wallets" class="block px-3 py-2 rounded hover:bg-slate-800" :class="route.startsWith('/wallets') ? 'bg-slate-800' : ''">💰 ولت‌ها</a>
          <a href="#/jobs" class="block px-3 py-2 rounded hover:bg-slate-800" :class="route.startsWith('/jobs') ? 'bg-slate-800' : ''">⚙️ Jobs</a>
          <a href="#/benchmark" class="block px-3 py-2 rounded hover:bg-slate-800" :class="route.startsWith('/benchmark') ? 'bg-slate-800' : ''">🎓 Benchmark</a>
          <a href="#/credentials" class="block px-3 py-2 rounded hover:bg-slate-800" :class="route === '/credentials' ? 'bg-slate-800' : ''">🔐 API Keys</a>
          <a href="#/change-password" class="block px-3 py-2 rounded hover:bg-slate-800" :class="route === '/change-password' ? 'bg-slate-800' : ''">🔑 تغییر رمز</a>
        </nav>
        <div class="text-sm text-slate-400 mt-auto pt-4 border-t border-slate-700">
          <button @click="toggleTheme" class="theme-toggle mb-3" :title="theme === 'dark-2026' ? 'حالت روشن' : 'Dark 2026'">
            <span class="dot"></span>
            <span>{{ theme === 'dark-2026' ? '✦ Dark 2026' : '☀ Light' }}</span>
          </button>
          <div>{{ admin.username }}</div>
          <button @click="logout" class="mt-2 text-red-400 hover:text-red-300">خروج</button>
        </div>
      </aside>
      <main class="flex-1 p-8 overflow-auto">
        <div v-if="admin.mustChangePassword" class="mb-6 p-4 bg-amber-100 border-r-4 border-amber-500 rounded">
          <strong>⚠ توجه:</strong> از رمز پیش‌فرض استفاده می‌کنی. قبل از هر کار دیگه عوضش کن.
        </div>
        <login-page v-if="route === '/login'" @logged-in="checkAuth"></login-page>
        <change-password-page v-else-if="route === '/change-password'" @changed="checkAuth"></change-password-page>
        <dashboard-page v-else-if="route === '/dashboard'"></dashboard-page>
        <wallets-page v-else-if="route === '/wallets'" @open="navigate($event)"></wallets-page>
        <wallet-detail-page v-else-if="route.startsWith('/wallets/')" :id="route.split('/')[2]" @back="navigate('/wallets')"></wallet-detail-page>
        <jobs-page v-else-if="route === '/jobs'"></jobs-page>
        <benchmark-page v-else-if="route === '/benchmark'"></benchmark-page>
        <credentials-page v-else-if="route === '/credentials'"></credentials-page>
        <div v-else class="text-slate-500">صفحه یافت نشد</div>
      </main>
    </div>
  `,
})
.component('login-page', {
  emits: ['logged-in'],
  setup(_, { emit }) {
    const username = ref('admin'), password = ref(''), error = ref(''), busy = ref(false);
    const submit = async () => {
      error.value = ''; busy.value = true;
      try {
        await api('/auth/login', { method: 'POST', body: { username: username.value, password: password.value } });
        emit('logged-in');
      } catch (e) { error.value = e.status === 423 ? 'اکانت قفل شد (۱۵ دقیقه)' : 'رمز یا نام کاربری اشتباهه'; }
      finally { busy.value = false; }

            <tr>
              <th class="p-3 text-right">ID</th>
              <th class="p-3 text-right">هدف</th>
              <th class="p-3 text-right">چک‌شده</th>
              <th class="p-3 text-right">Hits</th>
              <th class="p-3 text-right">سرعت</th>
              <th class="p-3 text-right">مدت</th>
              <th class="p-3 text-right">وضعیت</th>
            </tr>
          </thead>
          <tbody>
            <tr v-for="r in runs" :key="r.id" class="border-b hover:bg-slate-50">
              <td class="p-3 mono">{{ r.id }}</td>
              <td class="p-3 mono">{{ r.target_count.toLocaleString() }}</td>
              <td class="p-3 mono">{{ r.checked_count.toLocaleString() }}</td>
              <td class="p-3 mono" :class="r.hit_count > 0 ? 'text-amber-600 font-bold' : 'text-slate-400'">{{ r.hit_count }}</td>
              <td class="p-3 mono text-xs">{{ r.avg_rate_per_sec || '—' }} /sec</td>
              <td class="p-3 mono text-xs">{{ r.duration_ms ? (r.duration_ms / 1000).toFixed(1) + 's' : '—' }}</td>
              <td class="p-3"><span class="px-2 py-0.5 rounded text-xs" :class="statusColor(r.status)">{{ r.status }}</span></td>
            </tr>
            <tr v-if="runs.length === 0"><td colspan="7" class="p-6 text-center text-slate-400">هیچ run‌ای نیست</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  `,
})
.component('credentials-page', {
  setup() {
    const items = ref([]);
    const showNew = ref(false);
    const showGbImport = ref(false);
    const form = reactive({ provider: 'trongrid', value: '', label: '' });
    const gbForm = reactive({ config: '', skipExisting: true });
    const gbBusy = ref(false);
    const gbResult = ref(null);
    const gbError = ref('');
    const newError = ref(''), newBusy = ref(false);
    let timer = null;
    const load = async () => { try { items.value = (await api('/api/credentials')).items; } catch {} };
    onMounted(() => { load(); timer = setInterval(load, 10000); });
    onUnmounted(() => clearInterval(timer));
    const submit = async () => {
      newError.value = ''; newBusy.value = true;
      try {
        await api('/api/credentials', { method: 'POST', body: { provider: form.provider, value: form.value.trim(), label: form.label.trim() || undefined }});
        form.value = ''; form.label = ''; showNew.value = false; load();
      } catch (e) { newError.value = e.message || 'خطا'; } finally { newBusy.value = false; }
    };
    const gbImport = async () => {
      gbError.value = ''; gbResult.value = null; gbBusy.value = true;
      try {
        const raw = gbForm.config.trim();
        if (!raw) throw new Error('JSON خالیه');
        try { JSON.parse(raw); } catch { throw new Error('JSON نامعتبر'); }
        const res = await api('/api/credentials/getblock/import', {
          method: 'POST',
          body: { config: raw, skipExisting: gbForm.skipExisting },
        });
        gbResult.value = res;
        if (res.added > 0) { await load(); }
      } catch (e) { gbError.value = e.message || 'خطا'; } finally { gbBusy.value = false; }
    };
    const remove = async (id) => { if (!confirm('حذف؟')) return; await api('/api/credentials/' + id, { method: 'DELETE' }); load(); };
    const toggle = async (cred) => { await api('/api/credentials/' + cred.id + '/toggle', { method: 'POST', body: { active: !cred.isActive } }); load(); };
    const unblock = async (id) => { await api('/api/credentials/' + id + '/unblock', { method: 'POST' }); load(); };
    const toggleBenchmark = async (cred) => {
      await api('/api/credentials/' + cred.id + '/benchmark', { method: 'POST', body: { allowed: !cred.benchmarkAllowed } });
      load();
    };
    const providerLabel = (p) => ({ trongrid: 'TronGrid', eth_rpc: 'ETH RPC', btc_api: 'BTC API' }[p] || p);
    const isBlocked = (cred) => cred.rateLimitedUntil && new Date(cred.rateLimitedUntil) > new Date();
    const grouped = computed(() => {
      const g = { trongrid: [], eth_rpc: [], btc_api: [] };
      for (const i of items.value) if (g[i.provider]) g[i.provider].push(i);
      return g;
    });
    return { showNew, showGbImport, form, gbForm, gbBusy, gbResult, gbError, gbImport, newError, newBusy, submit, remove, toggle, unblock, toggleBenchmark, providerLabel, isBlocked, grouped };
  },
  template: `
    <div>
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold">🔐 API Keys</h2>
        <div class="flex gap-2">
          <button @click="showGbImport = true" class="px-4 py-2 bg-indigo-600 text-white rounded">📥 ایمپورت GetBlock</button>
          <button @click="showNew = true" class="px-4 py-2 bg-blue-600 text-white rounded">➕ افزودن</button>
        </div>
      </div>
      <div v-for="provider in ['trongrid', 'eth_rpc', 'btc_api']" :key="provider" class="mb-6">
        <h3 class="font-bold mb-3">{{ providerLabel(provider) }} ({{ grouped[provider].length }})</h3>
        <div class="bg-white rounded-xl shadow overflow-hidden">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 border-b"><tr><th class="p-3 text-right">ID</th><th class="p-3 text-right">برچسب</th><th class="p-3 text-right">مقدار</th><th class="p-3 text-right">موفق</th><th class="p-3 text-right">ناموفق</th><th class="p-3 text-right">وضعیت</th><th class="p-3 text-right">Bench</th><th></th></tr></thead>
            <tbody>
              <tr v-for="c in grouped[provider]" :key="c.id" class="border-b">
                <td class="p-3 mono">{{ c.id }}</td><td class="p-3">{{ c.label || '—' }}</td>
                <td class="p-3 mono text-xs">{{ c.valuePreview }}</td>
                <td class="p-3 mono text-emerald-700">{{ c.successCount }}</td>
                <td class="p-3 mono text-red-700">{{ c.failureCount }}</td>
                <td class="p-3"><span v-if="isBlocked(c)" class="px-2 py-0.5 rounded text-xs bg-amber-100">⏸ blocked</span><span v-else-if="c.isActive" class="px-2 py-0.5 rounded text-xs bg-emerald-100 text-emerald-800">✔</span><span v-else class="px-2 py-0.5 rounded text-xs bg-slate-200">غیرفعال</span></td>
                <td class="p-3 text-xs">
                  <button @click="toggleBenchmark(c)" :title="c.benchmarkAllowed ? 'کلیک: ممنوع کردن benchmark' : 'کلیک: مجاز کردن benchmark'" class="px-2 py-0.5 rounded text-xs" :class="c.benchmarkAllowed ? 'bg-sky-100 text-sky-800' : 'bg-slate-200 text-slate-600'">
                    {{ c.benchmarkAllowed ? '✓' : '✗' }}
                  </button>
                </td>
                <td class="p-3 text-xs whitespace-nowrap">
                  <button v-if="isBlocked(c)" @click="unblock(c.id)" class="text-amber-600 me-2">unblock</button>
                  <button @click="toggle(c)" class="text-blue-600 me-2">{{ c.isActive ? 'غیرفعال' : 'فعال' }}</button>
                  <button @click="remove(c.id)" class="text-red-600">حذف</button>
                </td>
              </tr>
              <tr v-if="grouped[provider].length === 0"><td colspan="8" class="p-4 text-center text-slate-400 text-sm">هیچ کلیدی نیست</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div v-if="showNew" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
          <h3 class="text-lg font-bold mb-4">افزودن</h3>
          <form @submit.prevent="submit" class="space-y-3">
            <div><label class="block text-sm mb-1">نوع</label><select v-model="form.provider" class="w-full px-3 py-2 border rounded bg-white"><option value="trongrid">TronGrid</option><option value="eth_rpc">ETH RPC</option><option value="btc_api">BTC API</option></select></div>
            <div><label class="block text-sm mb-1">مقدار</label><input v-model="form.value" type="text" required class="w-full px-3 py-2 border rounded mono text-xs" /></div>
            <div><label class="block text-sm mb-1">برچسب</label><input v-model="form.label" type="text" class="w-full px-3 py-2 border rounded" /></div>
            <div v-if="newError" class="text-red-600 text-sm">{{ newError }}</div>
            <div class="flex gap-2 justify-end"><button type="button" @click="showNew = false" class="px-4 py-2 border rounded">انصراف</button><button type="submit" :disabled="newBusy || !form.value.trim()" class="px-4 py-2 bg-blue-600 text-white rounded disabled:opacity-50">{{ newBusy ? '...' : 'افزودن' }}</button></div>
          </form>
        </div>
      </div>
      <div v-if="showGbImport" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-xl w-full p-6">
          <h3 class="text-lg font-bold mb-2">📥 ایمپورت یکجا از GetBlock</h3>
          <p class="text-sm text-slate-500 mb-3">فایل JSON دانلود‌شده از داشبورد GetBlock رو اینجا پیست کن. توکن‌ها خودکار با آدرس کامل endpoint ذخیره می‌شن و روی <code>benchmark_allowed=false</code> تنظیم می‌شن تا سهمیهٔ free-tier حفظ بشه.</p>
          <form @submit.prevent="gbImport" class="space-y-3">
            <textarea v-model="gbForm.config" rows="8" required dir="ltr" class="w-full px-3 py-2 border rounded mono text-xs font-mono" placeholder='{"shared":{"eth":{"mainnet":{"jsonRpc":["<token>"]}}}}'></textarea>
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" v-model="gbForm.skipExisting"> رد کردن توکن‌های تکراری (بر اساس label)</label>
            <div v-if="gbError" class="text-red-600 text-sm">❌ {{ gbError }}</div>
            <div v-if="gbResult" class="text-sm bg-slate-50 rounded p-3 border">
              <div>✅ added: <b>{{ gbResult.added }}</b></div>
              <div>↷ skipped: <b>{{ gbResult.skipped }}</b> <span v-if="gbResult.skippedBtc > 0">(شامل {{ gbResult.skippedBtc }} BTC skip — مصرف‌کننده نداریم)</span></div>
              <div v-if="gbResult.invalid.length > 0">⚠ invalid: <b>{{ gbResult.invalid.length }}</b>
                <ul class="mt-1 text-xs text-amber-700">
                  <li v-for="m in gbResult.invalid" :key="m">• {{ m }}</li>
                </ul>
              </div>
            </div>
            <div class="flex gap-2 justify-end">
              <button type="button" @click="showGbImport = false" class="px-4 py-2 border rounded">بستن</button>
              <button type="submit" :disabled="gbBusy || !gbForm.config.trim()" class="px-4 py-2 bg-indigo-600 text-white rounded disabled:opacity-50">{{ gbBusy ? '...' : 'ایمپورت' }}</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  `,
})
.mount('#app');
</script>
</body>
</html>
